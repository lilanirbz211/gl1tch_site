<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>GLITCH — Assistenza Live</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="page-wrapper">
  <!-- ... (Stessa struttura HTML di prima) ... -->
  
  <div id="state-support" class="hidden">
    <!-- ... (Stesso contenuto di prima) ... -->
    <div id="ticket-new">
      <div class="form-group">
        <label>Oggetto</label>
        <input type="text" id="ticket-subject" />
      </div>
      <div class="form-group">
        <label>Messaggio</label>
        <textarea id="ticket-message"></textarea>
      </div>
      <button class="btn btn-purple" onclick="openTicket()">Apri Ticket</button>
    </div>
  </div>
</div>

<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script src="script.js"></script>
<script>
  emailjs.init('KmibMuTvje14wBlrZ');

  (async function init() {
    await GLITCH.fetchDB();
    var saved = sessionStorage.getItem('glitch_user_session');
    if (saved) {
      currentUser = JSON.parse(saved);
      showState('support');
      
      // LOGICA SHOP: rileva l'ordine in sospeso
      var pendingOrder = sessionStorage.getItem('pending_order');
      if (pendingOrder) {
          document.getElementById('ticket-subject').value = 'ORDINE: ' + pendingOrder;
          document.getElementById('ticket-message').value = 'Vorrei acquistare: ' + pendingOrder + '. Attendo istruzioni.';
          sessionStorage.removeItem('pending_order');
      }
      refreshChat();
    }
  })();

  function sendOTP() {
    var username = document.getElementById('reg-username').value;
    var email    = document.getElementById('reg-email').value;
    pendingOTP = String(Math.floor(1000 + Math.random() * 9000));
    pendingReg = { username: username, email: email };

    // NUOVO SERVICE ID
    emailjs.send('service_6ropnb3', 'template_jn6r0am', {
      username: username,
      email_to: email,
      otp_code: pendingOTP
    }).then(() => showState('otp'));
  }
  // ... (Resto delle funzioni doLogin, verifyOTP, ecc. rimangono invariate) ...
</script>
</body>
</html>
